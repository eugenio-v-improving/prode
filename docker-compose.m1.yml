version: "3"
services:
  prode-db:
    image: postgres:15.1
    container_name: prode-db
    restart: always
    command: ["postgres", "-c", "log_statement=all", "-c", "log_destination=stderr"]
    environment:
      POSTGRES_DB: "prode"
      POSTGRES_USER: "leniolabs"
      POSTGRES_PASSWORD: "leniolabs"
    ports:
      - "5433:5432"
    expose:
      - "5432"
